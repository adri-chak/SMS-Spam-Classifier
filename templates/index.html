<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpamGuard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      padding: 2rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .tagline {
      text-align: center;
      font-size: 12px;
      color: #3a7a55;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #111;
      border: 1px solid #1f5c3a;
      border-radius: 6px;
      color: #c8ffd8;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 1rem;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #00ff88;
    }

    textarea::placeholder {
      color: #2a4d38;
    }

    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.9rem;
      background: #00ff88;
      color: #050e08;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #00e87c; }
    button:active { transform: scale(0.98); }

    .result {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .result.spam {
      background: #1a0a0a;
      border: 1px solid #7a1f1f;
      color: #ff6b6b;
    }

    .result.ham {
      background: #0a1a10;
      border: 1px solid #1f5c3a;
      color: #00ff88;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>SPAM GUARD</h1>
    <p class="tagline">Naive Bayes Classifier</p>

    <form method="POST" action="/predict">
      <textarea
        name="message"
        placeholder="Paste your email or message here..."
        required
      >{{ message if message else '' }}</textarea>
      <button type="submit">PREDICT</button>
    </form>

    {% if prediction %}
    <div class="result {{ 'spam' if 'SPAM' in prediction else 'ham' }}">
      {{ prediction }}
    </div>
    {% endif %}
  </div>
</body>
</html>
